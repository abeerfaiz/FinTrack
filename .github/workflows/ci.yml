name: CI

# Trigger: run this pipeline on every push to any branch,
# and on every pull request targeting main.
# This means broken code is caught before it reaches main.
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test and Security Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fintrack_user
          POSTGRES_PASSWORD: fintrack_pass
          POSTGRES_DB: fintrack
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__FinTrackDb: "Host=localhost;Port=5432;Database=fintrack;Username=fintrack_user;Password=fintrack_pass"
      Jwt__Key: "ci-test-jwt-key-that-is-at-least-32-characters-long"
      Jwt__Issuer: "FinTrack"
      Jwt__Audience: "FinTrack"
      Encryption__Key: "dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItY2ktcGlwZWxpbmUtb25seQ=="

    steps:
      # Step 1: Check out your code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install .NET 10 SDK on the VM
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Step 3: Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Build the entire solution in Release mode
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Step 5: Install EF Core tools and run migrations
      # The PostgreSQL service is healthy by this point (health check
      # in the service definition ensures the DB is ready before steps run)
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 10.0.0

      - name: Run database migrations
        run: |
          dotnet ef database update \
            --project src/FinTrack.Infrastructure \
            --startup-project src/FinTrack.API \
            --configuration Release

      # Step 6: Run all tests including integration tests
      # Integration tests connect to the PostgreSQL service above
      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal

      # Step 7: Check for packages with known vulnerabilities
      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "❌ Vulnerable packages found"
            cat vulnerable.txt
            exit 1
          else
            echo "✅ No vulnerable packages found"
          fi

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only deploy on push to main — not on PRs or feature branches
    # This means every merge to main automatically deploys to Azure
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Step 1: Check out code fresh — deploy job runs independently
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install .NET 10 to publish the API
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Step 3: Publish the API in Release mode
      # dotnet publish compiles and bundles everything needed to run
      # the app — DLLs, static files, appsettings.json — into ./publish
      - name: Publish API
        run: |
          dotnet publish src/FinTrack.API/FinTrack.API.csproj \
            --configuration Release \
            --output ./publish

      # Step 4: Run migrations against Azure PostgreSQL before deploying
      # This ensures the schema is up to date before the new code goes live
      # Uses the real Azure connection string stored in GitHub Secrets
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef --version 10.0.0

      - name: Run Azure database migrations
        run: |
          dotnet ef database update \
            --project src/FinTrack.Infrastructure \
            --startup-project src/FinTrack.API \
            --configuration Release
        env:
          ConnectionStrings__FinTrackDb: ${{ secrets.AZURE_DB_CONNECTION_STRING }}

      # Step 5: Deploy the published output to Azure App Service
      # AZURE_PUBLISH_PROFILE is the XML publish profile from Azure portal
      # It contains the deployment credentials for fintrack-api
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: fintrack-api
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish